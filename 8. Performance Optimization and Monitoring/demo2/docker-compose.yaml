services:   # run this using -> docker compose up --build
  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    # container_name: prometheus  # error as previously did same container name, so pls auto generate
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge
